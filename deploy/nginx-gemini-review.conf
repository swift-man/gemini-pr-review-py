# nginx snippet for mounting gemini-review behind a path prefix on an existing
# server block. Reload: `nginx -s reload`.

# Example inside `server { listen 443 ssl; server_name review.gorani.me; ... }`:

# location /gemini-review/ {
#     proxy_pass         http://<your-host-lan-ip>:8023/;   # trailing slash strips prefix
#     proxy_set_header   Host              $host;
#     proxy_set_header   X-Real-IP         $remote_addr;
#     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
#     proxy_set_header   X-Forwarded-Proto $scheme;
#     proxy_read_timeout 30s;
#     client_max_body_size 10m;
# }

# External URL layout:
#   https://review.gorani.me/gemini-review/webhook   -> backend /webhook
#   https://review.gorani.me/gemini-review/healthz   -> backend /healthz
