# 기존 nginx server 블록 아래에 gemini-review 를 prefix 경로로 얹기 위한 스니펫.
# 적용: `nginx -s reload`.

# 예시 — `server { listen 443 ssl; server_name review.gorani.me; ... }` 블록 내부:

# location /gemini-review/ {
#     proxy_pass         http://<your-host-lan-ip>:8023/;   # 끝 슬래시가 prefix 를 잘라냄
#     proxy_set_header   Host              $host;
#     proxy_set_header   X-Real-IP         $remote_addr;
#     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
#     proxy_set_header   X-Forwarded-Proto $scheme;
#     proxy_read_timeout 30s;
#     client_max_body_size 10m;
# }

# 외부 URL 구조:
#   https://review.gorani.me/gemini-review/webhook   -> 백엔드 /webhook
#   https://review.gorani.me/gemini-review/healthz   -> 백엔드 /healthz
